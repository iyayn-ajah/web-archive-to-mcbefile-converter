<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive to Minecraft Bedrock File Converter</title>
    <link rel="icon" type="image/x-icon" href="/thumb.jpg?format=png&name=900x900">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'heading': ['"IBM Plex Mono"', 'monospace'],
                        'body': ['"IBM Plex Mono"', 'monospace'],
                    },
                    colors: {
                        'blackish': '#333',
                        'whitish': '#f2f7f5',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="font-body bg-black text-white min-h-screen">
    <button id="themeToggle" class="theme-toggle-btn">
        <svg id="theme-toggle-dark-icon" class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
        </svg>
        <svg id="theme-toggle-light-icon" class="w-5 h-5 text-black hidden" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path>
        </svg>
    </button>

    <main class="container mx-auto px-4 py-8 max-w-2xl flex items-center justify-center min-h-screen">
        <div class="border-2 border-white p-8 raised-shadow w-full">
            <div class="text-center mb-6">
                <h1 class="text-3xl md:text-4xl font-bold font-heading mb-4">
                    Archive to Minecraft Bedrock File Converter
                </h1>
            </div>

            <div class="mb-4">
                <label class="label-text">Select an archive file:</label>
                <input type="file" id="file">
                <p id="filename">No file selected.</p>
            </div>

            <div class="mb-6">
                <label class="label-text">Output type:</label>
                <div class="select-wrapper">
                    <select id="type">
                        <option value=".mcpack">Minecraft Pack (.mcpack)</option>
                        <option value=".mcaddon">Minecraft Add-on (.mcaddon)</option>
                        <option value=".mcworld">Minecraft World (.mcworld)</option>
                    </select>
                </div>
            </div>

            <div class="text-center">
                <button id="convert">Convert</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
